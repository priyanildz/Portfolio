<div
  *ngIf="project; else notFound"
  class="min-h-screen bg-[#0a0a0a] py-16 px-6 md:px-12 lg:px-24 relative"
>
  <div class="max-w-6xl mx-auto">
    <button
      (click)="backToProjects()"
      class="flex items-center gap-3 text-gray-400 hover:text-cyan-400 transition-all mb-10 font-mono uppercase tracking-[0.2em] text-xs group"
    >
      <i class="fa-solid fa-arrow-left text-sm group-hover:-translate-x-1 transition-transform"></i>
      <span>Back to Projects</span>
    </button>

    <header class="mb-12">
      <h1 class="text-5xl md:text-7xl font-black text-white mb-6 italic tracking-tighter uppercase leading-none">
        {{ project.title }}
      </h1>

      <div class="flex flex-wrap gap-2">
        <span
          *ngFor="let tag of project.tags"
          class="px-3 py-1 bg-cyan-400/5 text-cyan-400 border border-cyan-400/20 rounded-lg text-[10px] font-mono uppercase tracking-widest"
        >
          {{ tag }}
        </span>
      </div>
    </header>

    <div class="grid lg:grid-cols-[1.4fr_1fr] gap-16 items-start mt-12">
      <div class="space-y-12">
        <div>
          <h3 class="text-white font-bold flex items-center gap-3 mb-4 uppercase tracking-wider text-sm">
            <i class="fa-solid fa-microchip text-cyan-400"></i> Technical Insight
          </h3>
          <p class="text-gray-400 leading-relaxed text-lg border-l border-cyan-400/20 pl-6 italic">
            {{ project.insight }}
          </p>
        </div>

        <div>
          <h3 class="text-white font-bold flex items-center gap-3 mb-4 uppercase tracking-wider text-sm">
            <i class="fa-solid fa-shield-halved text-cyan-400"></i> Challenges Overcome
          </h3>
          <p class="text-gray-400 leading-relaxed text-lg pl-6">
            {{ project.challenges }}
          </p>
        </div>
      </div>

      <div class="lg:justify-self-end lg:w-full max-w-sm bg-[#111]/40 border border-white/5 rounded-3xl p-6 h-fit">
        <h3 class="text-white text-xs font-mono uppercase tracking-[0.25em] mb-5">Project Links</h3>

        <div class="flex flex-col gap-3">
          <a
            [href]="project.repoUrl"
            target="_blank"
            rel="noopener noreferrer"
            class="inline-flex items-center justify-between gap-3 px-5 py-3 bg-cyan-400 text-black font-black rounded-xl hover:bg-white transition-all duration-300 text-xs uppercase tracking-widest"
          >
            <span>Repository</span>
            <i class="fa-solid fa-up-right-from-square"></i>
          </a>

          <a
            *ngIf="project.liveDemoUrl"
            [href]="project.liveDemoUrl"
            target="_blank"
            rel="noopener noreferrer"
            class="inline-flex items-center justify-between gap-3 px-5 py-3 bg-white/5 border border-cyan-400/30 text-cyan-400 font-black rounded-xl hover:bg-cyan-400/10 transition-all duration-300 text-xs uppercase tracking-widest"
          >
            <span>Live Demo</span>
            <i class="fa-solid fa-arrow-up-right-from-square"></i>
          </a>
        </div>
      </div>
    </div>
  </div>
</div>

<ng-template #notFound>
  <div class="min-h-screen bg-[#0a0a0a] flex items-center justify-center text-cyan-400 font-mono uppercase">
    Project Not Found.
  </div>
</ng-template>
