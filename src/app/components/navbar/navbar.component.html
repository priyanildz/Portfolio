<nav class="fixed left-6 top-1/2 -translate-y-1/2 z-50 hidden lg:flex flex-col gap-2 p-3 bg-black/40 backdrop-blur-xl border border-white/10 rounded-3xl shadow-2xl">
  <a
    *ngFor="let item of navItems"
    [href]="'#' + item.id"
    class="group relative p-4 text-gray-400 hover:text-cyan-400 transition-all rounded-2xl hover:bg-white/5"
  >
    <i [class]="item.iconClass + ' text-lg'"></i>
    <span class="absolute left-16 top-1/2 -translate-y-1/2 px-3 py-1 bg-cyan-400 text-black text-[10px] font-black uppercase tracking-widest rounded-md opacity-0 group-hover:opacity-100 transition-all duration-300 pointer-events-none whitespace-nowrap translate-x-[-10px] group-hover:translate-x-0">
      {{ item.name }}
    </span>
  </a>
</nav>
